<h2>选择你偏好的整体视觉风格方向</h2>
<p class="subtitle">考虑到课堂大屏使用场景（教学一体机/互动白板），风格需要明亮、清晰、远距离可辨识</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>清新教育风</h3>
      <p>天蓝主色 + 白色底板 + 柔和圆角。类似 Kahoot/Quizlet，轻松活泼，适合中小学课堂</p>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#4A90D9;" title="主色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#5AC8FA;" title="辅助"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#34C759;" title="成功"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#FF9500;" title="警告"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#FF3B30;" title="错误"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>活力竞技风</h3>
      <p>深紫渐变 + 霓虹高亮色 + 圆角卡片。游戏感强，竞技氛围浓，适合比赛场景</p>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <div style="width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);" title="主色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#FF6B6B;" title="辅助"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#51CF66;" title="成功"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#FFD43B;" title="警告"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#FF8787;" title="错误"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>极简白板风</h3>
      <p>大面积留白 + 黑板深绿点缀 + 衬线标题。模仿教室黑板/白板感，学术气息浓</p>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#2E5C3E;" title="主色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#F8F9FA;border:1px solid #ddd;" title="背景"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#40A050;" title="成功"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#C4843A;" title="警告"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#C04040;" title="错误"></div>
      </div>
    </div>
  </div>
</div>
