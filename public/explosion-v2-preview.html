<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explosion V2 — 自由落体粒子</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a14; color: #e0e0e0; font-family: 'Courier New', monospace; min-height: 100vh; }

  .header {
    text-align: center; padding: 28px 16px 4px;
  }
  .header h1 {
    font-family: 'Press Start 2P', monospace; font-size: 13px;
    color: #06D6A0; text-shadow: 0 0 10px rgba(6,214,160,0.6); margin-bottom: 6px;
  }
  .header p { color: #666; font-size: 10px; }

  .section-label {
    text-align: center;
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    color: #8B83F0; text-shadow: 0 0 8px rgba(139,131,240,0.4);
    padding: 32px 16px 8px; letter-spacing: 2px;
  }
  .note { font-size: 9px; color: #555; text-align: center; margin: 0 0 12px; font-family: monospace; }

  .demo-wrap {
    max-width: 760px; margin: 0 auto; padding: 0 16px 28px;
    display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
  }
  .fx-card {
    background: #0d0d1a; border: 1px solid #1a1a30; padding: 12px; text-align: center;
  }
  .fx-card canvas { display: block; border: 1px solid #111; background: #050510; cursor: pointer; }
  .fx-label {
    font-family: 'Press Start 2P', monospace; font-size: 7px;
    color: #aaa; margin-top: 8px; letter-spacing: 1px;
  }
  .fx-btn {
    margin-top: 8px; padding: 6px 16px;
    font-family: 'Courier New', monospace; font-size: 10px; font-weight: 700;
    color: #8B83F0; background: transparent;
    border: 1px solid #8B83F040; cursor: pointer; transition: all 0.15s;
  }
  .fx-btn:hover { border-color: #8B83F0; box-shadow: 0 0 8px rgba(139,131,240,0.3); }
</style>
</head>
<body>

<div class="header">
  <h1>EXPLOSION V2</h1>
  <p>粒子爆散 → 自由落体 · 优化抛物线轨迹</p>
</div>

<!-- OPTION: Pure physics parabola -->
<div class="section-label">▸ 抛物线自由落体 (Parabolic Gravity Fall) ◂</div>
<div class="demo-wrap">
  <div class="fx-card">
    <canvas id="c1" width="220" height="160"></canvas>
    <div class="fx-label">PARABOLIC FALL</div>
    <div class="fx-desc">初始向外弹出→达到最高点→自由落体下落</div>
    <button class="fx-btn" onclick="trigger1()">RETRIGGER</button>
  </div>
</div>

<!-- OPTION: Varying gravity weights -->
<div class="section-label">▸ 对比：当前版本 (直线飞散 vs 抛物线) ◂</div>
<div class="demo-wrap">
  <div class="fx-card">
    <canvas id="c2" width="220" height="160"></canvas>
    <div class="fx-label">CURRENT (linear interpolated)</div>
    <div class="fx-desc">CSS ease-out 线性插值 · 可能产生分段感</div>
    <button class="fx-btn" onclick="trigger2()">RETRIGGER</button>
  </div>
  <div class="fx-card">
    <canvas id="c3" width="220" height="160"></canvas>
    <div class="fx-label">FIXED (physics arc)</div>
    <div class="fx-desc">逐帧物理计算抛物线 · 自然重力下落</div>
    <button class="fx-btn" onclick="trigger3()">RETRIGGER</button>
  </div>
</div>

<script>
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return {r,g,b};
}

// ── Helper: run a particle system on a canvas ──
function makeSystem(canvasId, baseColor, getInitialState) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const CX = W/2, CY = H*0.42;
  const BW = 64, BH = 50;

  let particles = [];
  let running = false, startTime = 0;

  function drawBlock(alpha = 1, color = baseColor) {
    ctx.save();
    ctx.globalAlpha = alpha;
    const rgb = hexToRgb(color);
    const bx = CX - BW/2, by = CY - BH/2;
    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.15)`;
    ctx.fillRect(bx, by, BW, BH);
    ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`;
    ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, BW, BH);
    ctx.fillStyle = `#fff`;
    ctx.font = 'bold 12px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('apple', CX, CY + 5);
    ctx.restore();
  }

  function spawnParticles() {
    const rgb = hexToRgb(baseColor);
    const rows = 8, cols = 10;
    const cx = cols/2, cy = rows/2;
    const bx = CX - BW/2, by = CY - BH/2;
    const cellW = BW / cols, cellH = BH / rows;

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const px = col + Math.random() * 0.4;
        const py = row + Math.random() * 0.4;
        const angle = Math.atan2(py - cy, px - cx);
        const speed = 50 + Math.random() * 100;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed - 25;
        const gravity = 160 + Math.random() * 100;
        const life = 0.3 + Math.random() * 0.35;

        const sx = bx + px * cellW;
        const sy = by + py * cellH;
        const size = 3 + Math.random() * 4;
        const rv = Math.min(255,Math.max(0,rgb.r + Math.floor(Math.random()*60-30)));
        const gv = Math.min(255,Math.max(0,rgb.g + Math.floor(Math.random()*60-30)));
        const bv = Math.min(255,Math.max(0,rgb.b + Math.floor(Math.random()*60-30)));

        particles.push({
          sx, sy, vx, vy, gravity, life,
          elapsed: Math.random() * 0.05,
          size, color: `rgb(${rv},${gv},${bv})`,
        });
      }
    }
  }

  const initial = getInitialState;

  function update(dt) {
    for (let p of particles) {
      p.elapsed += dt;
      if (p.elapsed < 0) continue;
      const t = p.elapsed;
      const px = p.sx + p.vx * t;
      const py = p.sy + p.vy * t + 0.5 * p.gravity * t * t;
      p._x = px; p._y = py;
    }
    particles = particles.filter(p => p.elapsed <= p.life);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    if (!running) { drawBlock(1); return; }

    const elapsed = (performance.now() - startTime) / 1000;
    const blockAlpha = Math.max(0, 1 - elapsed * 5);
    if (blockAlpha > 0) drawBlock(blockAlpha);

    for (let p of particles) {
      if (p.elapsed < 0) continue;
      const alpha = Math.max(0, 1 - p.elapsed / p.life);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(p._x - p.size/2, p._y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  let animId;
  function loop(t) {
    if (running) {
      const dt = Math.min(0.05, (t - (window['_last'+canvasId] || t)) / 1000);
      window['_last'+canvasId] = t;
      update(dt);
      if (particles.length === 0) running = false;
    }
    draw();
    animId = requestAnimationFrame(loop);
  }

  function trigger() {
    particles = [];
    spawnParticles();
    running = true;
    startTime = performance.now();
  }

  drawBlock(1);
  requestAnimationFrame(loop);
  setTimeout(() => trigger(), 700);

  return { trigger, canvas, ctx, drawBlock };
}

// ── Option 1: Parabolic fall ──
const sys1 = makeSystem('c1', '#FF3B30');
window.trigger1 = function() { sys1.trigger(); };

// ── Option 2: Simulate current CSS behavior (linear interpolated, no arc) ──
(function() {
  const canvas = document.getElementById('c2');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const CX = W/2, CY = H*0.42;
  const BW = 64, BH = 50;
  const baseColor = '#4B3FD9';

  let particles = [];
  let running = false, startTime = 0;

  function drawBlock(alpha = 1) {
    ctx.save(); ctx.globalAlpha = alpha;
    const rgb = hexToRgb(baseColor);
    const bx = CX - BW/2, by = CY - BH/2;
    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.15)`;
    ctx.fillRect(bx, by, BW, BH);
    ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`;
    ctx.lineWidth = 2; ctx.strokeRect(bx, by, BW, BH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px "Courier New", monospace';
    ctx.textAlign = 'center'; ctx.fillText('apple', CX, CY + 5);
    ctx.restore();
  }

  function spawnParticles() {
    // Simulate CSS linear interpolation: start→end directly
    const rgb = hexToRgb(baseColor);
    const rows = 8, cols = 10;
    const cellW = BW/cols, cellH = BH/rows;
    const bx = CX - BW/2, by = CY - BH/2;

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const px = col + Math.random() * 0.4;
        const py = row + Math.random() * 0.4;
        const angle = Math.atan2(py - rows/2, px - cols/2);
        const speed = 50 + Math.random() * 100;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed - 25;
        const gravity = 160 + Math.random() * 100;
        const life = 0.3 + Math.random() * 0.35;

        const sx = bx + px * cellW;
        const sy = by + py * cellH;
        const endX = sx + vx * life * 4.5;
        const endY = sy + (vy * life + 0.5 * gravity * life * life) * 4.5;

        const rv = Math.min(255,Math.max(0,rgb.r+Math.floor(Math.random()*60-30)));
        const gv = Math.min(255,Math.max(0,rgb.g+Math.floor(Math.random()*60-30)));
        const bv = Math.min(255,Math.max(0,rgb.b+Math.floor(Math.random()*60-30)));

        particles.push({
          sx, sy, endX, endY,
          life, elapsed: -Math.random() * 0.05,
          size: 3+Math.random()*4,
          color: `rgb(${rv},${gv},${bv})`,
        });
      }
    }
  }

  function update(dt) {
    for (let p of particles) {
      p.elapsed += dt;
      if (p.elapsed < 0) continue;
      const t = p.elapsed / p.life;
      // Linear interpolation (like CSS ease-out approximates)
      const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
      p._x = p.sx + (p.endX - p.sx) * eased;
      p._y = p.sy + (p.endY - p.sy) * eased;
    }
    particles = particles.filter(p => p.elapsed <= p.life);
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    if (!running) { drawBlock(1); return; }
    const elapsed = (performance.now() - startTime) / 1000;
    if (elapsed < 0.4) drawBlock(Math.max(0, 1 - elapsed * 6));

    for (let p of particles) {
      if (p.elapsed < 0) continue;
      ctx.globalAlpha = Math.max(0, 1 - p.elapsed / p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p._x - p.size/2, p._y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  let animId;
  function loop(t) {
    if (running) {
      const dt = Math.min(0.05, (t - (window._lastC2 || t)) / 1000);
      window._lastC2 = t;
      update(dt);
      if (particles.length === 0) running = false;
    }
    draw();
    animId = requestAnimationFrame(loop);
  }

  window.trigger2 = function() {
    particles = [];
    spawnParticles();
    running = true;
    startTime = performance.now();
  };
  drawBlock(1);
  requestAnimationFrame(loop);
  setTimeout(() => window.trigger2(), 700);
})();

// ── Option 3: True physics arc ──
(function() {
  const canvas = document.getElementById('c3');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const CX = W/2, CY = H*0.42;
  const BW = 64, BH = 50;
  const baseColor = '#06D6A0';

  let particles = [];
  let running = false, startTime = 0;

  function drawBlock(alpha = 1) {
    ctx.save(); ctx.globalAlpha = alpha;
    const rgb = hexToRgb(baseColor);
    const bx = CX - BW/2, by = CY - BH/2;
    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.15)`;
    ctx.fillRect(bx, by, BW, BH);
    ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`;
    ctx.lineWidth = 2; ctx.strokeRect(bx, by, BW, BH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px "Courier New", monospace';
    ctx.textAlign = 'center'; ctx.fillText('apple', CX, CY + 5);
    ctx.restore();
  }

  function spawnParticles() {
    const rgb = hexToRgb(baseColor);
    const rows = 8, cols = 10;
    const cellW = BW/cols, cellH = BH/rows;
    const bx = CX - BW/2, by = CY - BH/2;

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const px = col + Math.random() * 0.4;
        const py = row + Math.random() * 0.4;
        const angle = Math.atan2(py - rows/2, px - cols/2);
        const speed = 50 + Math.random() * 100;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed - 25;
        const gravity = 160 + Math.random() * 100;
        const life = 0.3 + Math.random() * 0.35;

        const sx = bx + px * cellW;
        const sy = by + py * cellH;

        const rv = Math.min(255,Math.max(0,rgb.r+Math.floor(Math.random()*60-30)));
        const gv = Math.min(255,Math.max(0,rgb.g+Math.floor(Math.random()*60-30)));
        const bv = Math.min(255,Math.max(0,rgb.b+Math.floor(Math.random()*60-30)));

        particles.push({
          sx, sy, vx, vy, gravity, life,
          elapsed: -Math.random() * 0.05,
          size: 3+Math.random()*4,
          color: `rgb(${rv},${gv},${bv})`,
        });
      }
    }
  }

  function update(dt) {
    for (let p of particles) {
      p.elapsed += dt;
      if (p.elapsed < 0) continue;
      const t = p.elapsed;
      // True physics: x = vx*t, y = vy*t + 0.5*g*t^2
      p._x = p.sx + p.vx * t * 4.5;
      p._y = p.sy + (p.vy * t + 0.5 * p.gravity * t * t) * 4.5;
    }
    particles = particles.filter(p => p.elapsed <= p.life);
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    if (!running) { drawBlock(1); return; }
    const elapsed = (performance.now() - startTime) / 1000;
    if (elapsed < 0.4) drawBlock(Math.max(0, 1 - elapsed * 6));

    for (let p of particles) {
      if (p.elapsed < 0) continue;
      ctx.globalAlpha = Math.max(0, 1 - p.elapsed / p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p._x - p.size/2, p._y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  let animId;
  function loop(t) {
    if (running) {
      const dt = Math.min(0.05, (t - (window._lastC3 || t)) / 1000);
      window._lastC3 = t;
      update(dt);
      if (particles.length === 0) running = false;
    }
    draw();
    animId = requestAnimationFrame(loop);
  }

  window.trigger3 = function() {
    particles = [];
    spawnParticles();
    running = true;
    startTime = performance.now();
  };
  drawBlock(1);
  requestAnimationFrame(loop);
  setTimeout(() => window.trigger3(), 700);
})();

window.trigger1 = function() {
  // re-trigger c1 by reloading (simplest)
  location.reload();
};
</script>
</body>
</html>
